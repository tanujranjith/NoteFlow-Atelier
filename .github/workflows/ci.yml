name: CI — release gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks (syntax, smoke, round-trip, versions, rebrand, compat, csp, persistence, modal, network, encoding, responsive, brand, docbg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run static release-gate checks
        run: npm run check:all

  browser-tests:
    name: Browser tests (Chromium)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:e2e:chromium
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .tmp/playwright-results/
          retention-days: 14
